name: Build Android

on:
  push:
    branches:
      - main
      - "claude/**"
    paths:
      - "serverhub-android/**"
      - ".github/workflows/build-android.yml"
  pull_request:
    paths:
      - "serverhub-android/**"
  release:
    types: [created]

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Generate Gradle wrapper
        working-directory: serverhub-android
        run: gradle wrapper --gradle-version=8.9

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            VERSION="${{ github.ref_name }}"
            # Strip leading 'v' and convert semver to integer (e.g. 1.2.3 → 10203)
            VERSION_CODE=$(echo "$VERSION" | sed 's/^v//' | awk -F. '{printf "%d%02d%02d", $1, $2, $3}')
          else
            VERSION="0.0.0-$(git rev-parse --short HEAD)"
            VERSION_CODE=1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "version_code=${VERSION_CODE}" >> "$GITHUB_OUTPUT"

      # ── Signing (only when secrets are present) ────────────────────────────────
      - name: Decode keystore
        if: ${{ env.RELEASE_KEYSTORE != '' }}
        env:
          RELEASE_KEYSTORE: ${{ secrets.RELEASE_KEYSTORE }}
        run: echo "$RELEASE_KEYSTORE" | base64 --decode > serverhub-android/keystore.jks

      - name: Write keystore.properties
        if: ${{ env.RELEASE_KEYSTORE != '' }}
        env:
          RELEASE_KEYSTORE: ${{ secrets.RELEASE_KEYSTORE }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          cat > serverhub-android/keystore.properties <<EOF
          storeFile=keystore.jks
          storePassword=${RELEASE_STORE_PASSWORD}
          keyAlias=${RELEASE_KEY_ALIAS}
          keyPassword=${RELEASE_KEY_PASSWORD}
          EOF

      # ── Build ──────────────────────────────────────────────────────────────────
      - name: Build release APK
        working-directory: serverhub-android
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.version.name=${{ steps.version.outputs.version }} \
            -Pandroid.injected.version.code=${{ steps.version.outputs.version_code }}

      # ── Artefacts ─────────────────────────────────────────────────────────────
      - name: Upload APK artefact
        uses: actions/upload-artifact@v4
        with:
          name: serverhub-android-${{ steps.version.outputs.version }}
          path: serverhub-android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      # ── GitHub Release upload (tags only) ─────────────────────────────────────
      - name: Attach to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: serverhub-android/app/build/outputs/apk/release/*.apk
